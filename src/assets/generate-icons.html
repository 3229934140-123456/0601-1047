<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>生成扩展图标</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 { color: #6366f1; }
    .icons {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      align-items: flex-end;
    }
    .icon-wrap {
      text-align: center;
    }
    canvas {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #4f46e5; }
    .instructions {
      background: #f9fafb;
      padding: 16px;
      border-radius: 8px;
      line-height: 1.6;
      color: #374151;
    }
    .all-btn {
      padding: 12px 28px;
      font-size: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>🎨 生成扩展图标</h1>
  <p>点击下方按钮下载所有尺寸的PNG图标，将它们保存到 <code>src/assets/</code> 目录。</p>

  <div class="icons" id="icon-container"></div>

  <button class="all-btn" onclick="downloadAll()">⬇️ 一键下载全部图标</button>

  <div class="instructions" style="margin-top:30px;">
    <strong>使用说明：</strong>
    <ol>
      <li>点击"一键下载全部图标"按钮</li>
      <li>将下载的 icon16.png、icon48.png、icon128.png 移动到 <code>src/assets/</code> 目录</li>
      <li>在浏览器中加载扩展即可正常显示图标</li>
    </ol>
    <small>提示：你也可以用自己的图标替换这些默认图标。</small>
  </div>

  <script>
    const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
      <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#6366f1"/>
          <stop offset="100%" style="stop-color:#8b5cf6"/>
        </linearGradient>
      </defs>
      <rect width="128" height="128" rx="24" fill="url(#bg)"/>
      <g transform="translate(32, 36)">
        <rect x="4" y="0" width="56" height="42" rx="4" fill="white" opacity="0.95"/>
        <polygon points="26,14 46,24 26,34" fill="#6366f1"/>
        <rect x="8" y="46" width="48" height="6" rx="2" fill="white" opacity="0.6"/>
        <rect x="8" y="56" width="36" height="4" rx="2" fill="white" opacity="0.4"/>
      </g>
      <text x="64" y="112" font-family="-apple-system, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">TRACKER</text>
    </svg>`;

    const sizes = [
      { size: 16, name: 'icon16' },
      { size: 48, name: 'icon48' },
      { size: 128, name: 'icon128' }
    ];

    const container = document.getElementById('icon-container');

    sizes.forEach(({ size, name }) => {
      const wrap = document.createElement('div');
      wrap.className = 'icon-wrap';
      wrap.innerHTML = `
        <canvas id="canvas-${name}" width="${size}" height="${size}" style="width:${Math.max(size, 48)}px;height:${Math.max(size, 48)}px;"></canvas>
        <div style="margin-top:8px;font-size:12px;color:#6b7280;">${size}×${size}</div>
        <button onclick="downloadIcon('${name}', ${size})">下载</button>
      `;
      container.appendChild(wrap);

      const canvas = document.getElementById(`canvas-${name}`);
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, size, size);
      };
      img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
    });

    function downloadIcon(name, size) {
      const canvas = document.getElementById(`canvas-${name}`);
      const link = document.createElement('a');
      link.download = `${name}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadAll() {
      sizes.forEach(({ size, name }) => {
        setTimeout(() => downloadIcon(name, size), sizes.indexOf({ size, name }) * 200);
      });
    }
  </script>
</body>
</html>
