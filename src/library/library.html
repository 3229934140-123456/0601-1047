<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收藏列表 - 影视追踪</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="library.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-inner">
        <div class="logo-area">
          <span class="logo-icon">📺</span>
          <h1 class="app-title">影视追踪</h1>
        </div>
        <div class="header-nav">
          <a href="library.html" class="nav-link active">收藏列表</a>
          <a href="#" class="nav-link" id="nav-options">设置</a>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">全部作品</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-watching">0</div>
          <div class="stat-label">在看</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-want">0</div>
          <div class="stat-label">想看</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-completed">0</div>
          <div class="stat-label">已看完</div>
        </div>
      </div>

      <div class="filter-bar">
        <div class="filter-group">
          <label class="filter-label">搜索</label>
          <input type="text" class="input" id="search-input" placeholder="搜索作品标题、标签...">
        </div>
        <div class="filter-group">
          <label class="filter-label">状态</label>
          <select class="select" id="filter-status">
            <option value="">全部状态</option>
            <option value="want_to_watch">想看</option>
            <option value="watching">在看</option>
            <option value="completed">看完</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="filter-label">平台</label>
          <select class="select" id="filter-platform">
            <option value="">全部平台</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="filter-label">评分</label>
          <select class="select" id="filter-rating">
            <option value="">全部评分</option>
            <option value="5">★★★★★</option>
            <option value="4">★★★★☆ 及以上</option>
            <option value="3">★★★☆☆ 及以上</option>
            <option value="2">★★☆☆☆ 及以上</option>
            <option value="1">★☆☆☆☆ 及以上</option>
            <option value="0">未评分</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="filter-label">标签</label>
          <select class="select" id="filter-tag">
            <option value="">全部标签</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="filter-label">排序</label>
          <select class="select" id="sort-by">
            <option value="updatedAt-desc">最近更新</option>
            <option value="createdAt-desc">最近添加</option>
            <option value="lastWatchedAt-desc">最近观看</option>
            <option value="rating-desc">评分最高</option>
            <option value="title-asc">标题 A-Z</option>
            <option value="title-desc">标题 Z-A</option>
          </select>
        </div>
      </div>

      <div class="view-toggle">
        <button class="view-btn active" data-view="grid" title="网格视图">▦</button>
        <button class="view-btn" data-view="list" title="列表视图">≡</button>
      </div>

      <div class="items-container" id="items-container"></div>
      <div class="empty-state" id="empty-state" style="display:none;">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">暂无符合条件的作品</div>
      </div>
    </main>
  </div>

  <div id="item-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">作品详情</div>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="../shared/storage.js"></script>
  <script src="library.js"></script>
</body>
</html>
